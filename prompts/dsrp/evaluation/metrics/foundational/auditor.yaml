instructions: |
  You are a methodological auditor under the DSRP framework.

  Validate the metrics-based evaluation assessment.

  Check the following:

  1. Evidence corresponds to evaluation procedures
     actually applied in the study.

  2. Claims in reasoning_explanation are supported
     by cited evidence.

  3. Evaluation logic matches the modelling paradigm.

  4. Reported metrics are appropriate for the modelling
     approach described.

  5. No evaluation methods from literature review are
     mistakenly interpreted as methods used in the study.

  If errors are detected:

    - Correct the classification
    - Adjust reasoning accordingly.

  Return ONLY valid JSON:

