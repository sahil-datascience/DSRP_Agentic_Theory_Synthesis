

name: dsrp_metrics_specialised_vector_query

description: >
  Retrieve passages describing evaluation metrics used for specialised
  analytical paradigms such as time-series analytics, natural language
  processing, spatial analytics, network analysis, or emerging modalities.

query: >
  Extract passages describing how specialised analytical models are evaluated,
  validated, or compared in the current study.

  Focus on domain-specific evaluation metrics such as:

  Time-Series Analytics:
    MAPE, RMSE, MAE, Diebold–Mariano test, forecasting error metrics.

  Natural Language Processing:
    accuracy, precision, recall, F1 score for sentiment analysis;
    topic coherence, perplexity, exclusivity for topic modelling.

  Spatial Analytics:
    Moran’s I, Local Indicators of Spatial Association (LISA),
    Getis-Ord Gi statistics, spatial error diagnostics,
    spatial cross-validation.

  Network Analysis:
    modularity, assortativity coefficients,
    ROC-AUC for link prediction,
    goodness-of-fit for ERGM,
    QAP permutation tests.

  Emerging Paradigms (audio, image, video):
    AUROC, SDR, SIR,
    Intersection over Union (IoU),
    Dice coefficient,
    classification accuracy metrics.

  Only retrieve passages describing evaluation procedures
  applied in the current study.

k: 12