
name: data_understanding_vector_query

description: >
  Retrieve passages describing the nature, source, format, and characteristics of data used in the study.

query: >
  Extract passages describing:
  - data sources (e.g., TripAdvisor, GPS logs, booking records),
  - dataset description,
  - number of records,
  - data collection methods,
  - APIs or scraping,
  - file formats (CSV, XML, HTML),
  - structured tables,
  - raw text, images, videos,
  - time-series data,
  - geospatial data,
  - geographic references used analytically (city, region, country, destination),
  - comparisons between locations or destinations,
  - origin-destination flows,
  - geotag, GPS, latitude/longitude, coordinate, or map-based variables,
  - network or relational data,
  - preprocessing steps.

k: 25